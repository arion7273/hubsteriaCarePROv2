name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'cursor/**'

jobs:
  verify:
    name: Test and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hubsteria
          POSTGRES_PASSWORD: hubsteria
          POSTGRES_DB: hubsteria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hubsteria -d hubsteria_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://hubsteria:hubsteria@localhost:5432/hubsteria_test
      TEST_DATABASE_URL: postgres://hubsteria:hubsteria@localhost:5432/hubsteria_test
      BACKEND_REPOSITORY_MODE: postgres
      RUN_POSTGRES_INTEGRATION: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        run: npm test

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run PostgreSQL integration tests
        run: npm run test:postgres

      - name: Build production bundle
        run: npm run build
